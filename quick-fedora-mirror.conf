# Destination directory inside the container (bind mount)
DESTD=/data

# Timestamp file for tracking last sync
TIMEFILE=/data/.quick-fedora-mirror.timefile

# Master module — must be fedora-buffet (required by quick-fedora-mirror)
MASTERMODULE=fedora-buffet

# Sync only fedora-enchilada (main Fedora content)
MODULES=(fedora-enchilada)

# Map module name to directory name on disk
MODULEMAPPING=(fedora-enchilada fedora)

# Keep only x86_64 and aarch64 — exclude all other arches, plus debug, source, and test releases
FILTEREXP='(/i386|/armhfp|/ppc64/|/ppc64le|/s390x|/source|/SRPMS|/debug/|/releases/test|/development/|\.img|\.qcow2|\.raw\.xz|\.box)'

# Verbosity: 3 = slightly verbose (good for container logs without --progress noise)
VERBOSE=3
