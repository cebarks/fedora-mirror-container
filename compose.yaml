services:
  sync:
    image: ghcr.io/cebarks/fedora-mirror-sync:latest
    restart: unless-stopped
    stop_grace_period: 60s
    environment:
      - SYNC_INTERVAL=${SYNC_INTERVAL:-21600}
      - RSYNC_REMOTE=${RSYNC_REMOTE:?RSYNC_REMOTE must be set to an upstream rsync mirror URL}
    volumes:
      - ${MIRROR_DIR:-/srv/fedora-mirror}:/data
    healthcheck:
      test: ["CMD", "test", "-f", "/data/.sync-complete"]
      interval: 30s
      timeout: 5s
      retries: 1
      start_period: 86400s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${MIRROR_PORT:-8080}:80"
    volumes:
      - ${MIRROR_DIR:-/srv/fedora-mirror}:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      sync:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
