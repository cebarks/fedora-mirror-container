server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    keepalive_timeout 2s;
    keepalive_requests 100;

    types {
        application/octet-stream iso rpm;
    }

    location / {
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
        sendfile on;
        tcp_nopush on;
    }

    location ~* \.(xml|xml\.gz|xml\.xz|xml\.zst|xml\.zck|xml\.asc|sqlite|sqlite\.bz2|sqlite\.zst)$ {
        add_header Cache-Control "must-revalidate";
        expires epoch;
    }
}
